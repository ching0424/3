function getDB(){
  if(_db) return _db;
  if(!firebase.apps.length) firebase.initializeApp(FB_CFG);
  _db=firebase.database(); return _db;
}
function dbLoad(key,cb){
  const db=getDB(); if(!db){cb([]);return ()=>{};}
  const r=db.ref(key);
  r.on('value',snap=>{const v=snap.val();cb(v?Object.values(v):[]);});
  return ()=>r.off('value');
}
function dbSave(key,arr){
  const db=getDB(); if(!db) return;
  const obj={}; arr.forEach(i=>{obj[i.id]=i;});
  db.ref(key).set(obj).catch(console.error);
}


// ─── Day / Night mode ────────────────────────────────────────────────────────
function getDayNight() {
  const h = new Date().getHours();
  return (h >= 18 || h < 6) ? "night" : "day";
}
function useTimeMode() {
  const [mode, setMode] = useState(getDayNight);
  useEffect(() => {
    const tick = setInterval(() => setMode(getDayNight()), 60000);
    return () => clearInterval(tick);
  }, []);
  useEffect(() => {
    document.body.className = mode === "night" ? "night-mode" : "day-mode";
  }, [mode]);
  return mode;
}

// ─── Night Sky Banner ─────────────────────────────────────────────────────────
const STARS = Array.from({length:120}, (_,i) => ({
  id:i,
  x:((i*137.508)%100).toFixed(2),
  y:((i*97.31)%72).toFixed(2),
  r:(0.1+(i%3)*0.1).toFixed(2),   // tiny: 0.1–0.3 only
  dur:(1.2+(i%7)*0.6).toFixed(1),
  delay:((i%11)*0.35).toFixed(2),
  bright: i%15===0,                // fewer "bright" ones
}));
const METEORS = [
  {x1:10,y1:6,x2:38,y2:24,dur:3.0,delay:5},
  {x1:62,y1:4,x2:88,y2:20,dur:2.6,delay:11},
  {x1:30,y1:2,x2:55,y2:17,dur:3.8,delay:18},
  {x1:78,y1:8,x2:98,y2:22,dur:2.2,delay:25},
];

function NightSkyBanner({ lpBg }) {
  return (
    <div style={{position:"relative",width:"100%",paddingBottom:"28%",minHeight:190,overflow:"hidden",
      borderRadius:20,marginBottom:24,border:"2px solid #2a3a8a",boxShadow:"0 6px 40px #00000077"}}>
      {lpBg
        ? <img src={lpBg} alt="night" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",objectPosition:"center 30%"}}/>
        : <div style={{position:"absolute",inset:0,background:"linear-gradient(170deg,#020818 0%,#080e30 40%,#0d1a55 100%)"}}/>
      }
      <div style={{position:"absolute",inset:0,background:lpBg
        ?"linear-gradient(180deg,rgba(2,6,25,0.6) 0%,rgba(8,14,45,0.3) 50%,rgba(5,8,30,0.75) 100%)"
        :"rgba(2,6,25,0.2)"}}/>
      <svg viewBox="0 0 100 70" preserveAspectRatio="xMidYMid slice"
        style={{position:"absolute",inset:0,width:"100%",height:"100%",zIndex:2}}>
        <defs>
          <filter id="sg"><feGaussianBlur stdDeviation="0.4"/></filter>
          {METEORS.map((_,i)=>(
            <linearGradient key={i} id={"mg"+i} x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stopColor="white" stopOpacity="0"/>
              <stop offset="50%" stopColor="white" stopOpacity="1"/>
              <stop offset="100%" stopColor="#b0d0ff" stopOpacity="0"/>
            </linearGradient>
          ))}
        </defs>
        {STARS.map(s=>(
          <circle key={s.id} cx={s.x} cy={s.y} r={s.r} fill="white">
            <animate attributeName="opacity"
              values={s.bright?"0.1;1;0.2;0.8;0.1":"0.1;0.8;0.1"}
              dur={s.dur+"s"} begin={s.delay+"s"} repeatCount="indefinite"/>
          </circle>
        ))}
        {METEORS.map((m,i)=>(
          <g key={i}>
            <line x1={m.x1} y1={m.y1} x2={m.x2} y2={m.y2}
              stroke={"url(#mg"+i+")"} strokeWidth="0.4" strokeLinecap="round">
              <animate attributeName="opacity" values="0;0;0.95;0.95;0" keyTimes="0;0.25;0.3;0.6;0.65"
                dur={m.dur+"s"} begin={m.delay+"s"} repeatCount="indefinite"/>
              <animateTransform attributeName="transform" type="translate"
                values="-20,0;0,0" dur={m.dur+"s"} begin={m.delay+"s"} repeatCount="indefinite"/>
            </line>
            <circle cx={m.x2} cy={m.y2} r="0.6" fill="white" opacity="0">
              <animate attributeName="opacity" values="0;0;0.8;0" keyTimes="0;0.28;0.55;0.65"
                dur={m.dur+"s"} begin={m.delay+"s"} repeatCount="indefinite"/>
            </circle>
          </g>
        ))}
      </svg>
      <div style={{position:"absolute",inset:0,zIndex:5,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontFamily:"'Dancing Script',cursive",fontSize:"clamp(30px,5vw,58px)",fontWeight:700,
          color:"#ddeeff",textShadow:"0 0 40px #4488ff99,0 0 80px #2244aa55,0 2px 12px rgba(0,0,0,0.8)",lineHeight:1.1}}>

        </div>
        <div style={{fontSize:"clamp(10px,1.4vw,13px)",color:"rgba(160,190,255,0.9)",marginTop:8,
          textShadow:"0 1px 8px rgba(0,0,0,0.8)",fontWeight:600,letterSpacing:"1.5px"}}>
          ✦ {new Date().toLocaleDateString("zh-TW",{weekday:"long",year:"numeric",month:"long",day:"numeric"})} ✦
        </div>
      </div>
    </div>
  );
}

const MONTHS = ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];

function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function uid() { return Math.random().toString(36).slice(2,9); }

// ─── Confirm Delete ───────────────────────────────────────────────────────────
function useConfirm() {
  const [state, setState] = useState({ open:false, msg:"", resolve:null });
  const ask = (msg) => new Promise(res => setState({ open:true, msg, resolve:res }));
  const answer = (yes) => { state.resolve(yes); setState({ open:false, msg:"", resolve:null }); };
  const Dialog = state.open ? (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div style={{background:"var(--card)",borderRadius:20,padding:"28px 32px",maxWidth:320,width:"90%",textAlign:"center",border:"2px solid var(--card-border)",boxShadow:"0 8px 40px rgba(0,0,0,0.4)"}}>
        <div style={{fontSize:32,marginBottom:12}}>🗑️</div>
        <div style={{fontFamily:"'Noto Sans TC',sans-serif",fontSize:16,color:"var(--text)",marginBottom:20,lineHeight:1.6}}>{state.msg}</div>
        <div style={{display:"flex",gap:12,justifyContent:"center"}}>
          <button className="btn btn-soft" style={{minWidth:80}} onClick={()=>answer(false)}>取消</button>
          <button className="btn btn-danger" style={{minWidth:80,background:"#e57373",color:"#fff"}} onClick={()=>answer(true)}>刪除</button>
        </div>
      </div>
    </div>
  ) : null;
  return { ask, Dialog };
}
function Stars({ n, onChange }) {
  return (
    <div className="stars">
      {[1,2,3,4,5].map(i => (
        <span key={i} onClick={() => onChange && onChange(i)}
          style={{cursor: onChange?"pointer":"default", color: i<=n?"#f5a623":"#ccc", fontSize:18}}>★</span>
      ))}
    </div>
  );
}

/* ── Reset & base ── */

// ═══════════════════════════════════════════════════════════════════════════
// CALENDAR PAGE
// ═══════════════════════════════════════════════════════════════════════════
function CalendarPage({ events, setEvents }) {
  const confirmDel = useConfirm();
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ title:"", date:today(), time:"", who:"both", color:"", note:"" });
  const [editId, setEditId] = useState(null);

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const cells = [];
  for (let i = firstDay-1; i >= 0; i--) cells.push({ day: daysInPrev-i, cur: false });
  for (let i = 1; i <= daysInMonth; i++) cells.push({ day: i, cur: true });
  while (cells.length % 7 !== 0) cells.push({ day: cells.length-firstDay-daysInMonth+1, cur: false });

  const addOrEdit = () => {
    if (!form.title || !form.date) return;
    const ev = { ...form, id: editId || uid() };
    if (editId) setEvents(p => p.map(e => e.id===editId ? ev : e));
    else setEvents(p => [...p, ev]);
    setShowModal(false); setEditId(null);
    setForm({ title:"", date:today(), time:"", who:"both", color:"", note:"" });
  };
  const del = id => setEvents(p => p.filter(e => e.id!==id));
  const openEdit = ev => { setForm(ev); setEditId(ev.id); setShowModal(true); };

  const monthStr = m => `${year}-${String(m+1).padStart(2,"0")}`;
  const dayStr = d => `${monthStr(month)}-${String(d).padStart(2,"0")}`;

  const whoColor = w => w==="her"?COLORS.her:w==="him"?COLORS.him:COLORS.both;

  const upcoming = [...events].filter(e => e.date >= today()).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,10);

  return (
    <div className="page">
      <div className="page-title" style={{position:"relative"}}>📅 共同行事曆</div>
      <div style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"flex-start"}}>
        {/* Calendar */}
        <div className="card" style={{flex:"1 1 380px"}}>
          <div className="cal-header">
            <button className="btn btn-soft btn-sm" onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1)}else setMonth(m=>m-1)}}>‹</button>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:var(--secondary)}}>{year}年 {MONTHS[month]}</span>
            <button className="btn btn-soft btn-sm" onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1)}else setMonth(m=>m+1)}}>›</button>
          </div>
          <div className="cal-grid">
            {DAYS.map(d=><div key={d} className="cal-day-name">{d}</div>)}
            {cells.map((c,i)=>{
              const ds = c.cur ? dayStr(c.day) : null;
              const dayEvs = ds ? events.filter(e=>e.date===ds) : [];
              const isToday = ds===today();
              return (
                <div key={i} className={`cal-day${!c.cur?" other-month":""}${isToday?" today":""}`}
                  onClick={()=>{ if(c.cur){ setForm(f=>({...f,date:ds})); setShowModal(true); } }}>
                  <div className="cal-day-num">{c.day}</div>
                  {dayEvs.slice(0,2).map(e=>(
                    <div key={e.id} className="cal-event-chip" style={{background:whoColor(e.who)+"33",color:whoColor(e.who)}}>{e.title}</div>
                  ))}
                  {dayEvs.length>2&&<div style={{fontSize:10,color:var(--muted)}}>+{dayEvs.length-2}</div>}
                </div>
              );
            })}
          </div>
        </div>

        {/* Upcoming + add */}
        <div style={{flex:"1 1 240px"}}>
          <button className="btn btn-primary" style={{width:"100%",marginBottom:16}} onClick={()=>{setEditId(null);setForm({title:"",date:today(),time:"",who:"both",note:""});setShowModal(true)}}>＋ 新增行程</button>
          <div className="card">
            <div className="card-title">即將到來</div>
            {upcoming.length===0&&<div className="empty">暫無行程</div>}
            {upcoming.map(e=>(
              <div key={e.id} className="event-item">
                <div style={{width:10,height:10,borderRadius:"50%",background:whoColor(e.who),flexShrink:0}}/>
                <div className="event-date">{e.date} {e.time}</div>
                <div className="event-title">{e.title}</div>
                <span className={`badge badge-${e.who}`}>{e.who==="her"?"7ing":e.who==="him"?"KM":"共同"}</span>
                <button className="btn btn-sm btn-soft" onClick={()=>openEdit(e)}>✏️</button>
                <button className="btn btn-sm btn-danger" onClick={async()=>{if(await confirmDel.ask("確定要刪除這個行程嗎？"))del(e.id);}}>🗑️</button>
              </div>
            ))}
          </div>

          {/* Legend */}
          <div className="card" style={{padding:16}}>
            <div className="chip-row">
              <span className="badge badge-her">7ing的行程</span>
              <span className="badge badge-him">KM的行程</span>
              <span className="badge badge-both">共同行程</span>
            </div>
          </div>
        </div>
      </div>

      {confirmDel.Dialog}
      {showModal&&(
        <div className="overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">{editId?"編輯行程":"新增行程"}</div>
            <label>標題</label>
            <input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="行程名稱"/>
            <div className="form-row">
              <div className="form-group"><label>日期</label><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
              <div className="form-group"><label>時間</label><input type="time" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))}/></div>
            </div>
            <label>誰的行程</label>
            <select value={form.who} onChange={e=>setForm(f=>({...f,who:e.target.value}))}>
              <option value="her">7ing</option>
              <option value="him">KM</option>
              <option value="both">共同</option>
            </select>
            <label>備註</label>
            <textarea value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="可選"/>
            <div className="modal-actions">
              <button className="btn btn-soft" onClick={()=>setShowModal(false)}>取消</button>
              <button className="btn btn-primary" onClick={addOrEdit}>{editId?"儲存":"新增"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// GOALS PAGE
// ═══════════════════════════════════════════════════════════════════════════
function GoalsPage({ goals, setGoals, goalLog, setGoalLog }) {
  const confirmDel = useConfirm();
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ name:"", who:"both", deadline:"" });
  const [tab, setTab] = useState("all");

  const addGoal = () => {
    if (!form.name) return;
    setGoals(p=>[...p,{ ...form, id:uid(), done:false, createdAt:today() }]);
    setShowModal(false);
    setForm({ name:"", who:"both", deadline:"" });
  };
  const toggle = id => setGoals(p=>p.map(g=>g.id===id?{...g,done:!g.done}:g));
  const del    = id => setGoals(p=>p.filter(g=>g.id!==id));

  const whoLabel = w=>w==="her"?"7ing":w==="him"?"KM":"共同";
  const whoColor = w=>w==="her"?COLORS.her:w==="him"?COLORS.him:COLORS.both;
  const filtered = tab==="all"?goals:goals.filter(g=>g.who===tab);

  const total    = filtered.length;
  const doneCount= filtered.filter(g=>g.done).length;
  const overallPct = total>0 ? Math.round((doneCount/total)*100) : 0;

  return (
    <div className="page">
      <div className="page-title" style={{position:"relative"}}>🎯 每日目標</div>

      {/* Overall progress bar */}
      {total>0&&(
        <div className="card" style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:var(--secondary)}}>今日整體進度</span>
            <span style={{fontSize:22,fontWeight:700,color:overallPct===100?COLORS.green:COLORS.primary}}>
              {overallPct===100?"🎉 全部完成！":`${overallPct}%`}
            </span>
          </div>
          <div className="progress-track" style={{height:16,borderRadius:8}}>
            <div className="progress-fill" style={{
              width:`${overallPct}%`,
              background:overallPct===100
                ?`linear-gradient(90deg,${COLORS.green},#a8d8b0)`
                :`linear-gradient(90deg,${COLORS.accent},${COLORS.primary})`,
              borderRadius:8,
              transition:"width .5s cubic-bezier(.4,0,.2,1)"
            }}/>
          </div>
          <div style={{fontSize:13,color:var(--muted),marginTop:8,textAlign:"right"}}>
            已完成 {doneCount} / {total} 個目標
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <div className="tab-row" style={{margin:0}}>
          {["all","her","him","both"].map(t=>(
            <button key={t} className={`tab-pill${tab===t?" active":""}`} onClick={()=>setTab(t)}>
              {t==="all"?"全部":t==="her"?"7ing的":t==="him"?"KM的":"共同"}
            </button>
          ))}
        </div>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}>＋ 新增目標</button>
      </div>

      {filtered.length===0&&<div className="empty">🌱 新增你們的目標吧！</div>}
      {filtered.map(g=>(
        <div key={g.id} className="card goal-item" style={{
          borderLeft:`4px solid ${whoColor(g.who)}`,
          opacity: g.done ? 0.7 : 1,
          transition:"opacity .2s"
        }}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            {/* Big checkbox */}
            <div onClick={()=>toggle(g.id)} style={{
              width:28, height:28, borderRadius:8, border:`2.5px solid ${g.done?COLORS.green:COLORS.accent}`,
              background: g.done?COLORS.green:"#fff", cursor:"pointer", flexShrink:0,
              display:"flex", alignItems:"center", justifyContent:"center",
              transition:"all .2s", boxShadow: g.done?`0 0 0 3px ${COLORS.green}22`:"none"
            }}>
              {g.done&&<span style={{color:"#fff",fontSize:16,fontWeight:700,lineHeight:1}}>✓</span>}
            </div>
            <div style={{flex:1}}>
              <div style={{
                fontWeight:700, fontSize:15,
                textDecoration: g.done?"line-through":"none",
                color: g.done?COLORS.muted:COLORS.text,
                transition:"all .2s"
              }}>{g.name}</div>
              <div style={{display:"flex",gap:8,alignItems:"center",marginTop:3}}>
                <span className={`badge badge-${g.who}`}>{whoLabel(g.who)}</span>
                {g.deadline&&<span style={{fontSize:11,color:var(--muted)}}>截止 {g.deadline}</span>}
                {g.done&&<span style={{fontSize:12,color:#52b788,fontWeight:700}}>完成 ✅</span>}
              </div>
            </div>
            <button className="btn btn-sm btn-danger" onClick={async()=>{if(await confirmDel.ask("確定要刪除這個目標嗎？"))del(g.id);}}>🗑️</button>
          </div>
        </div>
      ))}

      {confirmDel.Dialog}
      {/* ── Daily History Log ── */}
      {goalLog.length>0&&(
        <div className="card" style={{marginTop:8}}>
          <div className="card-title">📊 每日完成紀錄</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
            {[...goalLog].reverse().slice(0,30).map(l=>(
              <div key={l.id} style={{textAlign:"center",minWidth:52}}>
                <div style={{
                  width:44,height:44,borderRadius:10,margin:"0 auto 4px",
                  background:l.pct===100?"#52b788":l.pct>=70?"#74c69d":l.pct>=40?"#ffd166":"#ffb3b3",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:13,fontWeight:700,color:l.pct===100?"#fff":"#1b3a2d",
                  boxShadow:"0 2px 6px #0001"
                }}>{l.pct}%</div>
                <div style={{fontSize:10,color:"#52796f"}}>{l.date.slice(5)}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:12,color:"#52796f",display:"flex",gap:16,flexWrap:"wrap"}}>
            <span>🟢 100% = 全完成</span>
            <span>🟡 70-99% = 不錯</span>
            <span>🟠 40-69% = 普通</span>
            <span>🔴 0-39% = 加油</span>
          </div>
        </div>
      )}

            {showModal&&(
        <div className="overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">新增目標</div>
            <label>目標名稱</label>
            <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="例：今天運動 30 分鐘"/>
            <div className="form-row">
              <div className="form-group"><label>誰的目標</label>
                <select value={form.who} onChange={e=>setForm(f=>({...f,who:e.target.value}))}>
                  <option value="her">7ing</option><option value="him">KM</option><option value="both">共同</option>
                </select>
              </div>
              <div className="form-group"><label>截止日（可選）</label>
                <input type="date" value={form.deadline} onChange={e=>setForm(f=>({...f,deadline:e.target.value}))}/>
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-soft" onClick={()=>setShowModal(false)}>取消</button>
              <button className="btn btn-primary" onClick={addGoal}>新增</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// READING PAGE
// ═══════════════════════════════════════════════════════════════════════════
async function searchBookCandidates(title) {
  try {
    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(title)}&maxResults=5`);
    const data = await res.json();
    if (!data.items?.length) return [];
    return data.items.map(item => {
      const info = item.volumeInfo;
      const cover = info.imageLinks?.thumbnail
        ?.replace("http://","https://")
        ?.replace("zoom=1","zoom=2") || "";
      return {
        title: info.title || "",
        author: info.authors?.[0] || "",
        cover,
      };
    }).filter(b => b.cover);
  } catch { return []; }
}

function BookModal({ book, onClose, onSave }) {
  const { useRef, useEffect: ue } = window.React || {};
  const [form, setForm] = useState(book || { title:"", author:"", who:"her", status:"reading", finishedAt:"", review:"", rating:0, coverUrl:"" });
  const [coverPreview, setCoverPreview] = useState(form.coverUrl||"");
  const [searching, setSearching] = useState(false);
  const [candidates, setCandidates] = useState([]);
  const [searchMsg, setSearchMsg] = useState("");
  const timerRef = { current: null };

  const handleTitleChange = e => {
    const val = e.target.value;
    setForm(f=>({...f,title:val}));
    setCandidates([]); setSearchMsg(""); setCoverPreview("");
    if (timerRef.current) clearTimeout(timerRef.current);
    if (val.trim().length < 1) return;
    timerRef.current = setTimeout(async () => {
      setSearching(true); setSearchMsg("🔍 搜尋中…");
      const results = await searchBookCandidates(val);
      setSearching(false);
      if (results.length > 0) {
        setCandidates(results);
        // Auto-select first result
        setCoverPreview(results[0].cover);
        setForm(f=>({ ...f, author: f.author || results[0].author }));
        setSearchMsg(`✓ 找到 ${results.length} 個結果，已自動選第一本`);
      } else {
        setSearchMsg("找不到封面，可手動貼上網址");
      }
    }, 700);
  };

  const pickCandidate = c => {
    setCoverPreview(c.cover);
    setForm(f=>({...f, author: c.author || f.author }));
    setCandidates([]);
    setSearchMsg("✓ 已選擇");
  };

  const save = () => { if(!form.title) return; onSave({...form, id:book?.id||uid(), coverUrl:coverPreview}); };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">{book?"編輯書本":"新增書本"}</div>

        <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
          {/* Cover preview */}
          <div style={{flexShrink:0}}>
            <div style={{width:90,height:126,borderRadius:10,overflow:"hidden",border:`2px solid ${COLORS.soft}`,background:var(--soft),display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
              {coverPreview
                ? <img src={coverPreview} alt="cover" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={()=>setCoverPreview("")}/>
                : <span style={{fontSize:36}}>{searching?"⏳":"📚"}</span>
              }
              {searching&&(
                <div style={{position:"absolute",inset:0,background:"#ffffffbb",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <div style={{width:24,height:24,border:`3px solid ${COLORS.accent}`,borderTopColor:COLORS.primary,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
                </div>
              )}
            </div>
            <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
            {searchMsg&&<div style={{fontSize:10,color:searchMsg.startsWith("✓")?COLORS.green:COLORS.muted,marginTop:4,maxWidth:90,lineHeight:1.3}}>{searchMsg}</div>}
          </div>

          <div style={{flex:1}}>
            <label>書名（輸入即自動搜尋封面）</label>
            <input value={form.title} onChange={handleTitleChange} placeholder="輸入書名…" autoFocus/>
            <label>作者</label>
            <input value={form.author} onChange={e=>setForm(f=>({...f,author:e.target.value}))} placeholder="自動填入，可修改"/>
          </div>
        </div>

        {/* Candidate picker */}
        {candidates.length > 1 && (
          <div style={{marginTop:12}}>
            <div style={{fontSize:12,color:var(--muted),marginBottom:8,fontWeight:700}}>選擇封面（滑動查看更多）</div>
            <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:4}}>
              {candidates.map((c,i)=>(
                <div key={i} onClick={()=>pickCandidate(c)} style={{flexShrink:0,cursor:"pointer",textAlign:"center",border:`2px solid ${coverPreview===c.cover?COLORS.primary:COLORS.soft}`,borderRadius:8,padding:4,background:coverPreview===c.cover?COLORS.soft:"#fff",transition:"all .15s"}}>
                  <img src={c.cover} alt={c.title} style={{width:60,height:85,objectFit:"cover",borderRadius:5,display:"block"}} onError={e=>e.target.closest("div").style.display="none"}/>
                  <div style={{fontSize:9,color:var(--muted),marginTop:3,maxWidth:64,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.title}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{marginTop:6}}>
          <label style={{marginTop:8}}>封面網址（可手動覆蓋）</label>
          <input value={coverPreview} onChange={e=>setCoverPreview(e.target.value)} placeholder="或直接貼上圖片網址"/>
        </div>

        <div className="form-row" style={{marginTop:12}}>
          <div className="form-group"><label>誰在讀</label>
            <select value={form.who} onChange={e=>setForm(f=>({...f,who:e.target.value}))}>
              <option value="her">7ing</option><option value="him">KM</option><option value="both">一起</option>
            </select>
          </div>
          <div className="form-group"><label>狀態</label>

async function searchMoviePoster(title) {
  try {
    const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=4f4f7f4d20ddfbe0561a4f413f4c6b2e&query=${encodeURIComponent(title)}&language=zh-TW`);
    const data = await res.json();
    if (!data.results?.length) {
      // fallback: English search
      const res2 = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=4f4f7f4d20ddfbe0561a4f413f4c6b2e&query=${encodeURIComponent(title)}`);
      const data2 = await res2.json();
      if (!data2.results?.length) return null;
      const m = data2.results[0];
      return { title: m.title, poster: m.poster_path ? `https://image.tmdb.org/t/p/w300${m.poster_path}` : "" };
    }
    const m = data.results[0];
    return { title: m.title, poster: m.poster_path ? `https://image.tmdb.org/t/p/w300${m.poster_path}` : "" };
  } catch { return null; }
}

function MovieModal({ movie, onClose, onSave }) {
  const [form, setForm] = useState(movie || { title:"", who:"both", status:"done", watchedAt:"", review:"", rating:0, posterUrl:"" });

  const [posterPreview, setPosterPreview] = useState(movie?.posterUrl||"");
  const timerRef = useState(null);

  const handleTitleChange = e => {
    const val = e.target.value;
    setForm(f=>({...f,title:val}));
    if (timerRef[0]) clearTimeout(timerRef[0]);
    if (val.length < 2) return;
    timerRef[0] = setTimeout(async () => {
      setSearching(true);
      const result = await searchMoviePoster(val);
      setSearching(false);
      if (result?.poster) setPosterPreview(result.poster);
    }, 800);
  };

  const save = () => { if(!form.title) return; onSave({...form,id:movie?.id||uid(),posterUrl:posterPreview}); };

  return (

}

// MEMO PAGE
// ═══════════════════════════════════════════════════════════════════════════
function MemoPage({ memos, setMemos }) {
  const confirmDel = useConfirm();
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ title:"", content:"", who:"both", photos:[] });
  const [editId, setEditId] = useState(null);
  const [lightbox, setLightbox] = useState(null);

  const addOrEdit = () => {
    if(!form.title&&!form.content&&form.photos.length===0) return;
    const memo = {...form, id:editId||uid(), updatedAt:today()};
    setMemos(p=>editId?p.map(m=>m.id===editId?memo:m):[memo,...p]);
    setShowModal(false); setEditId(null);
    setForm({title:"",content:"",who:"both",photos:[]});
  };
  const del = id => setMemos(p=>p.filter(m=>m.id!==id));
  const openEdit = m => { setForm(m); setEditId(m.id); setShowModal(true); };

  const handlePhoto = e => {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => setForm(f=>({...f,photos:[...f.photos,{id:uid(),url:ev.target.result,name:file.name}]}));
      reader.readAsDataURL(file);
    });
  };
  const removePhoto = id => setForm(f=>({...f,photos:f.photos.filter(p=>p.id!==id)}));
  const whoLabel = w=>w==="her"?"7ing":w==="him"?"KM":"共同";
  const whoColor = w=>w==="her"?COLORS.her:w==="him"?COLORS.him:COLORS.both;

  return (
    <div className="page">
      <div className="page-title" style={{position:"relative"}}>📝 備忘錄</div>
      <button className="btn btn-primary" style={{marginBottom:16}} onClick={()=>{setEditId(null);setForm({title:"",content:"",who:"both",photos:[]});setShowModal(true)}}>＋ 新增備忘錄</button>
      {confirmDel.Dialog}
      {memos.length===0&&<div className="empty">📝 記下重要的事情吧！</div>}
      <div style={{columns:"300px 2",gap:16}}>
        {memos.map(m=>(
          <div key={m.id} className="card" style={{breakInside:"avoid",marginBottom:16,borderLeft:`4px solid ${whoColor(m.who)}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                {m.title&&<div style={{fontFamily:"'Caveat',cursive",fontSize:18,fontWeight:700,color:var(--secondary)}}>{m.title}</div>}
                <div style={{display:"flex",gap:6,alignItems:"center",marginTop:2}}>
                  <span className={`badge badge-${m.who}`}>{whoLabel(m.who)}</span>
                  <span style={{fontSize:11,color:var(--muted)}}>{m.updatedAt}</span>
                </div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button className="btn btn-sm btn-soft" onClick={()=>openEdit(m)}>✏️</button>
                <button className="btn btn-sm btn-danger" onClick={async()=>{if(await confirmDel.ask("確定要刪除這則備忘錄嗎？"))del(m.id);}}>🗑️</button>
              </div>
            </div>
            {m.content&&<div style={{fontSize:14,lineHeight:1.8,color:var(--text),marginBottom:8,whiteSpace:"pre-wrap"}}>{m.content}</div>}
            {m.photos?.length>0&&(
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {m.photos.map(p=>(
                  <img key={p.id} src={p.url} alt={p.name}
                    onClick={()=>setLightbox(p.url)}
                    style={{width:64,height:64,objectFit:"cover",borderRadius:8,cursor:"pointer",border:`2px solid ${COLORS.soft}`,transition:"transform .15s"}}
                    onMouseEnter={e=>e.target.style.transform="scale(1.08)"}
                    onMouseLeave={e=>e.target.style.transform="scale(1)"}
                  />
                ))}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Lightbox */}
      {lightbox&&(
        <div className="overlay" onClick={()=>setLightbox(null)} style={{background:"rgba(0,0,0,0.88)",zIndex:300}}>
          <div style={{position:"relative",maxWidth:"90vw",maxHeight:"90vh"}}>
            <img src={lightbox} alt="full" style={{maxWidth:"90vw",maxHeight:"88vh",borderRadius:12,boxShadow:"0 8px 40px #000a",objectFit:"contain"}}/>
            <button onClick={()=>setLightbox(null)} style={{position:"absolute",top:-16,right:-16,width:36,height:36,borderRadius:"50%",border:"none",background:"white",fontSize:18,cursor:"pointer",fontWeight:700,boxShadow:"0 2px 8px #0004"}}>✕</button>
          </div>
        </div>
      )}

      {showModal&&(
        <div className="overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">{editId?"編輯備忘錄":"新增備忘錄"}</div>
            <label>標題（可選）</label>
            <input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="備忘錄標題…"/>
            <label>內容</label>
            <textarea value={form.content} onChange={e=>setForm(f=>({...f,content:e.target.value}))} placeholder="寫下任何東西…" style={{minHeight:100}}/>
            <label>誰的備忘錄</label>
            <select value={form.who} onChange={e=>setForm(f=>({...f,who:e.target.value}))}>
              <option value="her">7ing</option><option value="him">KM</option><option value="both">共同</option>
            </select>
            <label>上傳照片</label>
            <input type="file" accept="image/*" multiple onChange={handlePhoto} style={{padding:"6px 0",border:"none",background:"transparent"}}/>
            {form.photos.length>0&&(
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:8}}>
                {form.photos.map(p=>(
                  <div key={p.id} style={{position:"relative"}}>
                    <img src={p.url} alt={p.name} style={{width:60,height:60,objectFit:"cover",borderRadius:8,border:`2px solid ${COLORS.soft}`}}/>
                    <button onClick={()=>removePhoto(p.id)} style={{position:"absolute",top:-6,right:-6,width:18,height:18,borderRadius:"50%",border:"none",background:"#e57373",color:"white",fontSize:11,cursor:"pointer",fontWeight:700,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                  </div>
                ))}
              </div>
            )}
            <div className="modal-actions">
              <button className="btn btn-soft" onClick={()=>setShowModal(false)}>取消</button>
              <button className="btn btn-primary" onClick={addOrEdit}>{editId?"儲存":"新增"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// HAND-DRAWN DECORATIONS
// ═══════════════════════════════════════════════════════════════════════════
function Deco({ type="leaf", style={} }) {
  const s = { position:"absolute", pointerEvents:"none", opacity:0.13, ...style };
  if (type==="leaf") return (
    <svg width="48" height="48" viewBox="0 0 48 48" style={s}>
      <path d="M8,40 Q12,20 28,12 Q44,4 42,20 Q40,36 24,38 Q12,40 8,40Z" fill="currentColor" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
      <path d="M8,40 Q18,30 32,18" stroke="currentColor" strokeWidth="1.2" fill="none" strokeLinecap="round"/>
      <path d="M20,36 Q26,28 34,20" stroke="currentColor" strokeWidth="0.8" fill="none" strokeLinecap="round" opacity="0.6"/>
    </svg>
  );
  if (type==="star") return (
    <svg width="32" height="32" viewBox="0 0 32 32" style={s}>
      <path d="M16,2 L18.4,12 L28,10 L20.8,17 L24,27 L16,21 L8,27 L11.2,17 L4,10 L13.6,12Z" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"/>
    </svg>
  );
  if (type==="spiral") return (
    <svg width="40" height="40" viewBox="0 0 40 40" style={s}>
      <path d="M20,20 Q24,16 22,12 Q18,8 14,12 Q10,18 14,24 Q20,30 28,26 Q36,20 32,12 Q26,2 14,6" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
    </svg>
  );
  if (type==="heart") return (
    <svg width="36" height="36" viewBox="0 0 36 36" style={s}>
      <path d="M18,30 Q6,22 6,14 Q6,6 12,6 Q16,6 18,10 Q20,6 24,6 Q30,6 30,14 Q30,22 18,30Z" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round"/>
    </svg>
  );
  if (type==="dot-trail") return (
    <svg width="60" height="20" viewBox="0 0 60 20" style={s}>
      {[5,15,25,35,45,55].map((x,i)=>(
        <circle key={i} cx={x} cy={10+(i%2)*4-2} r={1.5+(i%3)*0.5} fill="currentColor" opacity={0.5+i*0.08}/>
      ))}
    </svg>
  );
  return null;
}

// FOOD PAGE
// ═══════════════════════════════════════════════════════════════════════════
async function searchGoogleMapUrl(name) {
  // Returns a Google Maps search link for the restaurant name
  return `https://www.google.com/maps/search/${encodeURIComponent(name)}`;
}

function FoodPage({ food, setFood }) {
  const confirmDel = useConfirm();
  const [showModal, setShowModal] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [form, setForm] = useState({ name:"", mapUrl:"", who:"both", rating:0, review:"", tags:[], date:"" });
  const [searching, setSearching] = useState(false);
  const [detail, setDetail] = useState(null);
  const [filterWho, setFilterWho] = useState("all");
  const mapTimer = useState(null);

  const whoLabel = w => w==="her"?"7ing":w==="him"?"KM":"一起";
  const whoColor = w => w==="her"?"#e07a9f":w==="him"?"#4ea8de":"#f4a261";

  const handleNameChange = async e => {
    const val = e.target.value;
    setForm(f=>({...f, name:val}));
    if (mapTimer[0]) clearTimeout(mapTimer[0]);
    if (val.length < 1) return;
    mapTimer[0] = setTimeout(async () => {
      setSearching(true);
      const url = await searchGoogleMapUrl(val);
      setForm(f=>({...f, mapUrl: url}));
      setSearching(false);
    }, 600);
  };

  const saveItem = () => {
    if (!form.name) return;
    const item = {...form, id: editItem?.id || uid(), createdAt: today()};
    setFood(p => editItem ? p.map(x=>x.id===item.id?item:x) : [...p, item]);
    setShowModal(false); setEditItem(null);
    setForm({ name:"", mapUrl:"", who:"both", rating:0, review:"", tags:[], date:"" });
  };
  const del = async id => { if(await confirmDel.ask("確定要刪除這家餐廳嗎？")) { setFood(p=>p.filter(f=>f.id!==id)); setDetail(null); }};
  const openEdit = item => { setForm(item); setEditItem(item); setShowModal(true); };

  const FOOD_TAGS = ["🍜 麵食","🍱 日式","🥩 燒肉","🍕 西式","🍣 壽司","☕ 咖啡","🧇 早午餐","🍰 甜點","🥗 輕食","🍲 火鍋"];

  const filtered = filterWho==="all" ? food : food.filter(f=>f.who===filterWho);

  return (
    <div className="page">
      {confirmDel.Dialog}
      <div className="page-title">🍜 美食地圖</div>

      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <div className="tab-row" style={{margin:0}}>
          {["all","her","him","both"].map(t=>(
            <button key={t} className={`tab-pill${filterWho===t?" active":""}`} onClick={()=>setFilterWho(t)}>
              {t==="all"?"全部":t==="her"?"7ing的":t==="him"?"KM的":"一起去"}
            </button>
          ))}
        </div>
        <button className="btn btn-primary" onClick={()=>{setEditItem(null);setForm({name:"",mapUrl:"",who:"both",rating:0,review:"",tags:[],date:""});setShowModal(true);}}>＋ 新增店家</button>
      </div>

      {filtered.length===0&&<div className="empty">🗺️ 記錄你們吃過的美食吧！</div>}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
        {filtered.map(item=>(
          <div key={item.id} className="card" style={{cursor:"pointer",borderLeft:`4px solid ${whoColor(item.who)}`,padding:18}}
            onClick={()=>setDetail(item)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontFamily:"'Caveat',cursive",fontSize:20,fontWeight:700,color:"var(--secondary)",marginBottom:4}}>{item.name}</div>
                <Stars n={item.rating}/>
              </div>
              <span className={`badge badge-${item.who}`}>{whoLabel(item.who)}</span>
            </div>
            {item.tags?.length>0&&(
              <div style={{display:"flex",gap:4,flexWrap:"wrap",margin:"8px 0"}}>
                {item.tags.map(t=><span key={t} style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:"var(--soft)",color:"var(--muted)"}}>{t}</span>)}
              </div>
            )}
            {item.review&&<div style={{fontSize:13,color:"var(--muted)",marginTop:6,lineHeight:1.6,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{item.review}</div>}
            <div style={{display:"flex",gap:10,marginTop:10,alignItems:"center"}}>
              {item.mapUrl&&(
                <a href={item.mapUrl} target="_blank" rel="noopener noreferrer"
                  onClick={e=>e.stopPropagation()}
                  style={{fontSize:12,color:"var(--primary)",textDecoration:"none",display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:8,background:"var(--soft)",fontWeight:700}}>
                  📍 Google Map

              )}
              {item.date&&<span style={{fontSize:11,color:"var(--muted)",marginLeft:"auto"}}>{item.date}</span>}

          </div>

      {/* Detail */}

            <div className="modal-actions">
              <button className="btn btn-danger btn-sm" onClick={()=>del(detail.id)}>刪除</button>

              <button className="btn btn-primary" onClick={()=>setDetail(null)}>關閉</button>
            </div>
          </div>
        </div>
      )}

      {/* Add/Edit Modal */}
      {showModal&&(
        <div className="overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">{editItem?"編輯店家":"新增店家"}</div>

            <label>店名（輸入後自動連結 Google Map）</label>
            <input value={form.name} onChange={handleNameChange} placeholder="例：鼎泰豐、一蘭拉麵…"/>
            {searching&&<div style={{fontSize:12,color:"var(--primary)",marginTop:3}}>📍 搜尋位置中…</div>}

            <label>Google Map 連結（可手動貼上覆蓋）</label>

            <div className="form-row">

                <select value={form.who} onChange={e=>setForm(f=>({...f,who:e.target.value}))}>

                  <option value="him">KM</option>

            <div className="modal-actions">
              <button className="btn btn-soft" onClick={()=>setShowModal(false)}>取消</button>
              <button className="btn btn-primary" onClick={saveItem}>{editItem?"儲存":"新增"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

        <div className="login-title">7ing &amp; KM</div>
        <div style={{fontSize:32,marginBottom:8}}>{mode==="night"?"🌙":"🌿"}</div>
        <div className="login-sub" style={{color: mode==="night"?"#8899cc":undefined}}>輸入密碼進入我們的小天地</div>
        <input
          className="login-input"
          type="password"
          value={pw}
          onChange={e=>{setPw(e.target.value);setErr("");}}
          onKeyDown={e=>e.key==="Enter"&&submit()}
          placeholder="••••••••••"
          autoFocus
          style={{
            animation: shake?"shake .4s ease":undefined,
            ...(mode==="night"?{background:"rgba(255,255,255,0.08)",color:"#ddeeff",borderColor:"#4a6dbf"}:{})
          }}
        />
        <div className="login-err">{err}</div>
        <button className="btn btn-primary" style={{width:"100%",marginTop:16,fontSize:16,padding:"12px"}} onClick={submit}>
          進入 →
        </button>
        <style>{`@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}`}</style>
      </div>
    </div>
  );
}

// HOME / DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════
function HomePage({ events, goals, books, notes, goalLog, mode, lpBg }) {
  const todayStr = today();
  const todayEvs = events.filter(e=>e.date===todayStr);
  const upcomingEvs = events.filter(e=>e.date>todayStr).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,3);
  const activeGoals = goals.slice(0,4);
  const recentBooks = books.filter(b=>b.status==="done").slice(-3);
  const readingNow = books.filter(b=>b.status==="reading").slice(0,3);

  const whoLabel = w=>w==="her"?"7ing":w==="him"?"KM":"共同";
  const whoColor = w=>w==="her"?COLORS.her:w==="him"?COLORS.him:COLORS.both;

  return (
    <div className="page">
      {/* Header banner - meadow scene */}
      {/* Banner: day = park scene, night = little prince */}
      {mode==="night" ? <NightSkyBanner lpBg={lpBg}/> : (
      <div style={{borderRadius:20,overflow:"hidden",marginBottom:24,position:"relative",boxShadow:"0 6px 32px #2d6a4f44",border:"2px solid #74c69d"}}>
        <style>{`
          /* ── Chase animation: tennis ball leads, poodle follows, collie last ── */
          @keyframes ballChase {
            0%   { transform: translateX(-80px) translateY(0px); }
            48%  { transform: translateX(1100px) translateY(0px); }
            49%  { transform: translateX(1100px) translateY(0px); opacity:0; }
            50%  { transform: translateX(-80px) translateY(0px); opacity:0; }
            52%  { opacity:1; }
            100% { transform: translateX(-80px) translateY(0px); }
          }
          @keyframes poodleChase {
            0%   { transform: translateX(-220px) translateY(0px); }
            48%  { transform: translateX(1100px) translateY(0px); }
            49%  { transform: translateX(1100px) translateY(0px); opacity:0; }
            50%  { transform: translateX(-220px) translateY(0px); opacity:0; }
            52%  { opacity:1; }
            100% { transform: translateX(-220px) translateY(0px); }
          }
          @keyframes collieChase {
            0%   { transform: translateX(-400px) translateY(0px); }
            48%  { transform: translateX(1100px) translateY(0px); }
            49%  { transform: translateX(1100px) translateY(0px); opacity:0; }
            50%  { transform: translateX(-400px) translateY(0px); opacity:0; }
            52%  { opacity:1; }
            100% { transform: translateX(-400px) translateY(0px); }
          }
          /* Body bob while running */
          @keyframes bodyBob {
            0%,100% { transform: translateY(0px) rotate(0deg); }
            25%     { transform: translateY(-4px) rotate(-1deg); }
            75%     { transform: translateY(2px) rotate(1deg); }
          }
          /* Front leg swing */
          @keyframes legFront {
            0%,100% { transform-origin: top center; transform: rotate(-30deg); }
            50%     { transform-origin: top center; transform: rotate(35deg); }
          }
          /* Back leg swing - opposite phase */
          @keyframes legBack {
            0%,100% { transform-origin: top center; transform: rotate(30deg); }
            50%     { transform-origin: top center; transform: rotate(-30deg); }
          }
          /* Ear flap */
          @keyframes earFlap {
            0%,100% { transform-origin: top center; transform: rotate(-8deg); }
            50%     { transform-origin: top center; transform: rotate(12deg); }
          }
          /* Tail wag */
          @keyframes tailWag {
            0%,100% { transform-origin: base; transform: rotate(-20deg); }
            50%     { transform-origin: base; transform: rotate(25deg); }
          }
          /* Ball bounce */
          @keyframes ballBounce {
            0%,100% { transform: translateY(0px) rotate(0deg); }
            50%     { transform: translateY(-6px) rotate(180deg); }
          }
          /* Poodle ear flap (softer) */
          @keyframes earFlapPoodle {
            0%,100% { transform-origin: top; transform: rotate(-5deg) scaleX(1); }
            50%     { transform-origin: top; transform: rotate(10deg) scaleX(0.9); }
          }
          .ball-anim   { animation: ballChase   5.5s linear infinite; }
          .poodle-anim { animation: poodleChase 5.5s linear infinite; animation-delay: 0.3s; }
          .collie-anim { animation: collieChase 5.5s linear infinite; animation-delay: 0.7s; }
        `}</style>

                {/* COLLAR */}

                <circle cx="80" cy="84" r="2.5" fill="#c0c0c0"/>

                {/* HEAD */}
                <ellipse cx="92" cy="76" rx="18" ry="15" fill="#1a1a1a" stroke="#111" strokeWidth="1.2"/>
                {/* white blaze on face - centre stripe */}
                <path d="M88,62 Q92,58 96,62 Q98,70 96,80 Q92,84 88,80 Q86,70 88,62Z"
                  fill="white" opacity="0.9"/>
                {/* black cap */}
                <ellipse cx="92" cy="63" rx="14" ry="8" fill="#111"/>

                {/* LEFT EAR - semi-erect, flaps */}
                <g style={{animation:"earFlap 0.28s ease-in-out infinite"}}>
                  <path d="M78,64 Q70,54 72,44 Q76,38 82,42 Q86,48 82,60Z"
                    fill="#1a1a1a" stroke="#111" strokeWidth="1"/>
                  {/* tan inner ear */}
                  <path d="M79,63 Q74,55 75,47 Q78,43 81,46 Q83,52 80,62Z"
                    fill="#8b6040" opacity="0.7"/>
                </g>

                {/* RIGHT EAR - forward-tilted */}
                <g style={{animation:"earFlap 0.28s ease-in-out infinite", animationDelay:"0.14s"}}>
                  <path d="M102,64 Q110,54 108,44 Q104,38 98,42 Q94,48 98,60Z"
                    fill="#1a1a1a" stroke="#111" strokeWidth="1"/>
                  <path d="M101,63 Q106,55 104,47 Q101,43 98,46 Q96,52 99,62Z"
                    fill="#8b6040" opacity="0.7"/>
                </g>

                {/* SNOUT */}
                <ellipse cx="106" cy="78" rx="11" ry="8" fill="#3a2820" stroke="#2a1810" strokeWidth="1"/>
                {/* lighter muzzle */}
                <ellipse cx="106" cy="80" rx="8" ry="5" fill="#6a4830" opacity="0.6"/>
                {/* nose */}
                <ellipse cx="107" cy="74" rx="5" ry="3.5" fill="#111"/>
                <circle cx="105" cy="74" r="1.5" fill="#333" opacity="0.5"/>
                <circle cx="109" cy="74" r="1.5" fill="#333" opacity="0.5"/>
                {/* nose highlight */}
                <circle cx="106" cy="73" r="1" fill="#555"/>

                {/* EYES - bright & alert */}
                <circle cx="95" cy="73" r="4.5" fill="#fff" stroke="#111" strokeWidth="0.5"/>
                <circle cx="95" cy="73" r="3.2" fill="#2d5a1a"/>
                <circle cx="95" cy="73" r="2" fill="#111"/>
                <circle cx="96.5" cy="71.5" r="1.2" fill="white"/>
                {/* eyebrow marking */}
                <path d="M91,68 Q95,66 99,68" stroke="#555" strokeWidth="1.5" fill="none" strokeLinecap="round"/>

                {/* TONGUE - out, excited! */}
                <path d="M104,84 Q109,93 107,98 Q104,102 100,98 Q98,93 103,85Z" fill="#ff6b6b"/>
                <line x1="103.5" y1="84" x2="103.5" y2="88" stroke="#e04444" strokeWidth="1.5"/>
                {/* tongue shine */}
                <ellipse cx="102" cy="91" rx="2" ry="3" fill="#ff9999" opacity="0.5"/>

                {/* FRONT RIGHT LEG */}
                <g style={{transformOrigin:"76px 113px", animation:"legFront 0.28s ease-in-out infinite"}}>
                  <rect x="71" y="113" width="11" height="20" rx="5.5" fill="#1a1a1a" stroke="#111" strokeWidth="1"/>
                  {/* white sock */}
                  <rect x="71" y="125" width="11" height="8" rx="5.5" fill="white" stroke="#ddd" strokeWidth="0.5"/>
                  <ellipse cx="76" cy="134" rx="7" ry="4.5" fill="#eee"/>
                  <circle cx="73" cy="135" r="2" fill="#ccc"/>
                  <circle cx="76" cy="136" r="2.2" fill="#ccc"/>
                  <circle cx="79" cy="135" r="2" fill="#ccc"/>
                </g>

                {/* FRONT LEFT LEG */}
                <g style={{transformOrigin:"88px 113px", animation:"legBack 0.28s ease-in-out infinite"}}>
                  <rect x="83" y="113" width="11" height="20" rx="5.5" fill="#1a1a1a" stroke="#111" strokeWidth="1"/>
                  <rect x="83" y="125" width="11" height="8" rx="5.5" fill="white" stroke="#ddd" strokeWidth="0.5"/>
                  <ellipse cx="88" cy="134" rx="7" ry="4.5" fill="#eee"/>
                  <circle cx="85" cy="135" r="2" fill="#ccc"/>
                  <circle cx="88" cy="136" r="2.2" fill="#ccc"/>
                  <circle cx="91" cy="135" r="2" fill="#ccc"/>
                </g>

                {/* BACK RIGHT LEG */}
                <g style={{transformOrigin:"32px 113px", animation:"legBack 0.28s ease-in-out infinite"}}>
                  <rect x="27" y="113" width="11" height="18" rx="5.5" fill="#1a1a1a" stroke="#111" strokeWidth="1"/>
                  <rect x="27" y="123" width="11" height="8" rx="5.5" fill="white" stroke="#ddd" strokeWidth="0.5"/>
                  <ellipse cx="32" cy="132" rx="7" ry="4" fill="#eee"/>
                </g>

                {/* BACK LEFT LEG */}
                <g style={{transformOrigin:"44px 113px", animation:"legFront 0.28s ease-in-out infinite"}}>
                  <rect x="39" y="113" width="11" height="18" rx="5.5" fill="#1a1a1a" stroke="#111" strokeWidth="1"/>
                  <rect x="39" y="123" width="11" height="8" rx="5.5" fill="white" stroke="#ddd" strokeWidth="0.5"/>
                  <ellipse cx="44" cy="132" rx="7" ry="4" fill="#eee"/>
                </g>

                {/* Fur detail lines on body */}
                <path d="M35,88 Q42,84 50,87" stroke="#333" strokeWidth="1" fill="none" strokeLinecap="round" opacity="0.6"/>

              </g>
            </g>

            </g>

      )}


      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
        {/* Today's events */}
        <div className="card">
          <div className="card-title">📅 今日行程</div>
          {todayEvs.length===0?<div style={{color:var(--muted),fontSize:14}}>今天沒有行程，好好休息 ☁️</div>
            :todayEvs.map(e=>(
              <div key={e.id} className="event-item" style={{padding:"8px 10px",marginBottom:6}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:whoColor(e.who)}}/>
                <div style={{flex:1}}>{e.time&&<span style={{fontSize:12,color:var(--muted),marginRight:8}}>{e.time}</span>}{e.title}</div>
                <span className={`badge badge-${e.who}`}>{whoLabel(e.who)}</span>
              </div>
            ))
          }
          {upcomingEvs.length>0&&<>
            <div style={{fontSize:12,color:var(--muted),fontWeight:700,margin:"12px 0 6px"}}>即將到來</div>
            {upcomingEvs.map(e=>(
              <div key={e.id} style={{fontSize:13,color:var(--text),padding:"4px 0",display:"flex",gap:8,alignItems:"center"}}>
                <span style={{color:var(--muted),minWidth:70}}>{e.date}</span>{e.title}
              </div>
            ))}
          </>}
        </div>

        {/* Goals summary */}
        <div className="card">
          <div className="card-title">🎯 目標進度</div>
          {activeGoals.length===0?<div style={{color:var(--muted),fontSize:14}}>還沒有目標！</div>
            :(() => {
              const total = goals.length;
              const doneCount = goals.filter(g=>g.done).length;
              const pct = total>0?Math.round((doneCount/total)*100):0;
              return (
                <>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <span style={{fontSize:13,color:var(--muted)}}>已完成 {doneCount} / {total} 個</span>
                    <span style={{fontSize:15,fontWeight:700,color:pct===100?COLORS.green:COLORS.primary}}>{pct===100?"🎉 全完成！":`${pct}%`}</span>
                  </div>
                  <div className="progress-track" style={{height:14,borderRadius:7,marginBottom:14}}>
                    <div className="progress-fill" style={{width:`${pct}%`,background:pct===100?`linear-gradient(90deg,${COLORS.green},#a8d8b0)`:undefined,borderRadius:7}}/>
                  </div>
                  {activeGoals.map(g=>(
                    <div key={g.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                      <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${g.done?COLORS.green:COLORS.accent}`,background:g.done?COLORS.green:"#fff",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        {g.done&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}
                      </div>
                      <span style={{fontSize:13,fontWeight:600,textDecoration:g.done?"line-through":"none",color:g.done?COLORS.muted:COLORS.text,flex:1}}>{g.name}</span>
                      <span className={`badge badge-${g.who}`}>{g.who==="her"?"7ing":g.who==="him"?"KM":"共同"}</span>
                    </div>
                  ))}
                </>
              );
            })()
          }
        </div>

        {/* Currently reading */}
        <div className="card">
          <div className="card-title">📖 正在閱讀</div>
          {readingNow.length===0?<div style={{color:var(--muted),fontSize:14}}>快去找本書讀吧！</div>
            :readingNow.map(b=>(
              <div key={b.id} style={{display:"flex",gap:10,marginBottom:12,alignItems:"center"}}>
                {b.coverUrl?<img src={b.coverUrl} style={{width:36,height:50,objectFit:"cover",borderRadius:4}} alt={b.title} onError={e=>e.target.style.display="none"}/>
                  :<div style={{width:36,height:50,background:var(--soft),borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center"}}>📚</div>}
                <div>
                  <div style={{fontSize:13,fontWeight:700}}>{b.title}</div>
                  <div style={{fontSize:11,color:var(--muted)}}>{b.author}</div>
                  <span className={`badge badge-${b.who}`} style={{marginTop:2}}>{whoLabel(b.who)}</span>
                </div>
              </div>
            ))
          }
        </div>

        {/* Recent memories */}
        <div className="card">
          <div className="card-title">💌 最近回憶</div>
          {notes.length===0?<div style={{color:var(--muted),fontSize:14}}>記錄你們的美好時光！</div>
            :notes.slice(0,3).map(n=>(
              <div key={n.id} style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}>
                <span style={{fontSize:20}}>{n.mood}</span>
                <div>
                  <div style={{fontSize:13,fontWeight:700}}>{n.title}</div>
                  <div style={{fontSize:11,color:var(--muted)}}>{n.date}</div>
                </div>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}

  const [tab, setTab] = useState("home");
  const [events, setEvents] = useState([]);
  const [goals, setGoals] = useState([]);
  const [goalLog, setGoalLog] = useState([]);
  const [books, setBooks] = useState([]);
  const [wishlist, setWishlist] = useState([]);
  const [notes, setNotes] = useState([]);
  const [movies, setMovies] = useState([]);
  const [mwishlist, setMwishlist] = useState([]);
  const [memos, setMemos] = useState([]);
  const [food, setFood] = useState([]);
  const saveTimer = useRef({});
  const [isReady, setIsReady] = useState(false);

  // Daily goal auto-log
  useEffect(() => {
    if (!isReady || goals.length === 0) return;
    const todayStr = today();
    const alreadyLogged = goalLog.some(l => l.date === todayStr);
    if (alreadyLogged) return;
    const now = new Date();
    // Log at end of day (after 23:00) or when user visits next day
    const lastLogDate = goalLog.length > 0 ? goalLog[goalLog.length-1].date : null;
    if (lastLogDate && lastLogDate !== todayStr) {
      // New day — log yesterday's completion
      const done = goals.filter(g => g.done && g.createdAt === lastLogDate).length;
      const total = goals.filter(g => g.createdAt === lastLogDate).length || goals.length;
      const pct = total > 0 ? Math.round((goals.filter(g=>g.done).length / goals.length)*100) : 0;
      setGoalLog(p => [...p, { date: lastLogDate, pct, done: goals.filter(g=>g.done).length, total: goals.length, id: uid() }]);
    }
  }, [isReady, goals]);

  // Load from localStorage on mount (sync)
  useEffect(() => {
    dbLoad(KEYS.events,    v => setEvents(v));
    dbLoad(KEYS.goals,     v => setGoals(v));
    dbLoad(KEYS.goalLog,   v => setGoalLog(v));
    dbLoad(KEYS.books,     v => setBooks(v));
    dbLoad(KEYS.wishlist,  v => setWishlist(v));
    dbLoad(KEYS.notes,     v => setNotes(v));
    dbLoad(KEYS.movies,    v => setMovies(v));
    dbLoad(KEYS.mwishlist, v => setMwishlist(v));
    dbLoad(KEYS.memos,     v => setMemos(v));
    dbLoad(KEYS.food,      v => setFood(v));
    setIsReady(true);
  }, []);

  // Debounced save
  const saveDebounced = (key, data) => {
    clearTimeout(saveTimer.current[key]);
    saveTimer.current[key] = setTimeout(() => dbSave(key, data), 400);
  };
  useEffect(() => { if(isReady) saveDebounced(KEYS.events,    events); },    [events]);
  useEffect(() => { if(isReady) saveDebounced(KEYS.goals,     goals); },     [goals]);
  useEffect(() => { if(isReady) saveDebounced(KEYS.goalLog,   goalLog); },   [goalLog]);
  useEffect(() => { if(isReady) saveDebounced(KEYS.books,     books); },     [books]);
  useEffect(() => { if(isReady) saveDebounced(KEYS.wishlist,  wishlist); },  [wishlist]);
  useEffect(() => { if(isReady) saveDebounced(KEYS.notes,     notes); },     [notes]);
  useEffect(() => { if(isReady) saveDebounced(KEYS.movies,    movies); },    [movies]);
  useEffect(() => { if(isReady) saveDebounced(KEYS.mwishlist, mwishlist); }, [mwishlist]);
  useEffect(() => { if(isReady) saveDebounced(KEYS.memos,     memos); },     [memos]);
  useEffect(() => { if(isReady) saveDebounced(KEYS.food,      food); },      [food]);

    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:mode==="night"?"#060c28":"#dff0d8"}}>
      <div style={{fontFamily:"'Dancing Script',cursive",fontSize:28,color:mode==="night"?"#6c8fd4":"#2d6a4f"}}>
        {mode==="night"?"✨ 載入中…":"🌿 載入中…"}
      </div>
    </div>
  );

  if (!authed) return <LoginScreen onAuth={()=>setAuthed(true)} mode={mode} lpBg={lpBg}/>;

  const [menuOpen, setMenuOpen] = useState(false);

  return (
    <>
      <style>{css}</style>
      <div className="app" onClick={()=>menuOpen&&setMenuOpen(false)}>
        <nav className="nav">
          <div className="nav-logo">7ing<span>♡</span>KM</div>
          <div style={{flex:1}}/>
          {/* Current page label */}
          <div style={{color:"#ffffffcc",fontSize:14,fontFamily:"'Noto Sans TC',sans-serif",marginRight:12}}>
            {TABS.find(t=>t.id===tab)?.name}
          </div>
          {/* Hamburger */}
          <button onClick={e=>{e.stopPropagation();setMenuOpen(m=>!m);}} style={{
            background:"none",border:"none",cursor:"pointer",padding:"8px",
            display:"flex",flexDirection:"column",gap:"5px",zIndex:120
          }}>
            {[0,1,2].map(i=>(
              <div key={i} style={{
                width:24,height:2.5,borderRadius:2,background:"#fff",transition:"all .25s",
                transform: menuOpen ? (i===0?"rotate(45deg) translate(5px,5px)":i===2?"rotate(-45deg) translate(5px,-5px)":"scaleX(0)") : "none",
              }}/>
            ))}
          </button>
          {/* Dropdown menu */}
          {menuOpen&&(
            <div onClick={e=>e.stopPropagation()} style={{
              position:"absolute",top:"100%",right:0,
              background:"var(--nav-bg)",
              border:"1px solid var(--nav-border)",
              borderRadius:"0 0 16px 16px",
              minWidth:180,zIndex:110,
              boxShadow:"0 8px 32px rgba(0,0,0,0.3)",
              overflow:"hidden",
            }}>
              {TABS.map(t=>(
                <div key={t.id}
                  onClick={()=>{setTab(t.id);setMenuOpen(false);}}
                  style={{
                    padding:"13px 20px",cursor:"pointer",display:"flex",
                    alignItems:"center",gap:12,
                    background:tab===t.id?"rgba(255,255,255,0.15)":"transparent",
                    color:"#fff",fontSize:15,
                    fontFamily:"'Noto Sans TC',sans-serif",
                    borderLeft:tab===t.id?"3px solid var(--accent)":"3px solid transparent",
                    transition:"background .15s",
                  }}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.1)"}
                  onMouseLeave={e=>e.currentTarget.style.background=tab===t.id?"rgba(255,255,255,0.15)":"transparent"}
                >
                  <span style={{fontSize:20}}>{t.label}</span>
                  <span>{t.name}</span>
                </div>
              ))}
            </div>
          )}
        </nav>
        {tab==="home"    && <HomePage events={events} goals={goals} books={books} notes={notes} goalLog={goalLog} mode={mode} lpBg={lpBg}/>}
        {tab==="calendar"&& <CalendarPage events={events} setEvents={setEvents}/>}
        {tab==="goals"   && <GoalsPage goals={goals} setGoals={setGoals} goalLog={goalLog} setGoalLog={setGoalLog}/>}
        {tab==="reading" && <ReadingPage books={books} setBooks={setBooks} wishlist={wishlist} setWishlist={setWishlist}/>}
        {tab==="movies"  && <MoviesPage movies={movies} setMovies={setMovies} mwishlist={mwishlist} setMwishlist={setMwishlist}/>}
        {tab==="food"    && <FoodPage food={food} setFood={setFood}/>}
        {tab==="memo"    && <MemoPage memos={memos} setMemos={setMemos}/>}
        {tab==="memory"  && <MemoryPage notes={notes} setNotes={setNotes}/>}
      </div>
    </>
  );
}


(function mount(){
  const splash = document.getElementById('splash');
  const root   = document.getElementById('root');
  try {
    ReactDOM.createRoot(root).render(React.createElement(App));
    splash.style.opacity='0';
    setTimeout(()=>splash.style.display='none', 600);
  } catch(e) {
    console.error('Mount error:',e);
    splash.innerHTML='<h1 style="color:#ff8888">載入失敗 😢</h1><p style="color:#ffaaaa;font-size:13px;max-width:300px;text-align:center">'+e.message+'</p>';
  }
})();
</script>
